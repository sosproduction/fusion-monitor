name: CI/CD - Build, Push to ECR, Deploy to ECS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:   us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER:  fusion-monitor-cluster
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── 1. Lint & build check ───────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint Python files
        run: |
          pip install flake8 --quiet
          flake8 producers/fusion/fusion_producer.py \
                 consumers/prometheus-bridge/prometheus_bridge.py \
                 consumers/timescale-writer/timescale_writer.py \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E203 \
            --exit-zero

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ── 2. Build & push to ECR (main branch only) ──────────────────────────────
  build-and-push:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & push fusion-producer
        run: |
          docker build -t $ECR_REGISTRY/fusion-producer:${{ steps.tag.outputs.TAG }} \
                       -t $ECR_REGISTRY/fusion-producer:latest \
                       ./producers/fusion
          docker push $ECR_REGISTRY/fusion-producer:${{ steps.tag.outputs.TAG }}
          docker push $ECR_REGISTRY/fusion-producer:latest

      - name: Build & push prometheus-bridge
        run: |
          docker build -t $ECR_REGISTRY/prometheus-bridge:${{ steps.tag.outputs.TAG }} \
                       -t $ECR_REGISTRY/prometheus-bridge:latest \
                       ./consumers/prometheus-bridge
          docker push $ECR_REGISTRY/prometheus-bridge:${{ steps.tag.outputs.TAG }}
          docker push $ECR_REGISTRY/prometheus-bridge:latest

      - name: Build & push timescale-writer
        run: |
          docker build -t $ECR_REGISTRY/timescale-writer:${{ steps.tag.outputs.TAG }} \
                       -t $ECR_REGISTRY/timescale-writer:latest \
                       ./consumers/timescale-writer
          docker push $ECR_REGISTRY/timescale-writer:${{ steps.tag.outputs.TAG }}
          docker push $ECR_REGISTRY/timescale-writer:latest

      - name: Build & push fusion-ui
        run: |
          docker build -t $ECR_REGISTRY/fusion-ui:${{ steps.tag.outputs.TAG }} \
                       -t $ECR_REGISTRY/fusion-ui:latest \
                       ./frontend
          docker push $ECR_REGISTRY/fusion-ui:${{ steps.tag.outputs.TAG }}
          docker push $ECR_REGISTRY/fusion-ui:latest

      - name: Save image tag
        run: echo "${{ steps.tag.outputs.TAG }}" > image-tag.txt

      - uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: image-tag.txt

  # ── 3. Deploy to ECS ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: image-tag

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy all services
        run: |
          for svc in fusion-producer prometheus-bridge timescale-writer fusion-ui grafana; do
            echo "Deploying $svc..."
            aws ecs update-service \
              --cluster $ECS_CLUSTER \
              --service $svc \
              --force-new-deployment \
              --region $AWS_REGION \
              --query "service.serviceName" \
              --output text
          done

      - name: Wait for fusion-ui to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services fusion-ui \
            --region $AWS_REGION

      - name: Deployment complete
        run: |
          echo "Deployment complete - SHA $(cat image-tag.txt)"
          echo "Dashboard: https://fusion-monitor.southofsleep.com"
          echo "Grafana:   https://grafana.fusion-monitor.southofsleep.com"